# Security headers for Daily Healthy Bites
# Add this to your nginx server block or include it

# Referrer Policy - control how much referrer info is sent
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy - disable unused browser features
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# X-Frame-Options - prevent clickjacking (already set, but ensure it's correct)
add_header X-Frame-Options "SAMEORIGIN" always;

# X-Content-Type-Options - prevent MIME sniffing (already set)
add_header X-Content-Type-Options "nosniff" always;

# Strict-Transport-Security - force HTTPS (already set, but ensure max-age is good)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# X-XSS-Protection - legacy but still useful for older browsers
add_header X-XSS-Protection "1; mode=block" always;

# Content-Security-Policy - basic policy (adjust as needed)
# Uncomment and customize after testing:
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
